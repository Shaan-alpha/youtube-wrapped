name: 🚀 Feature Request
description: Suggest an analytical metric, chart, or pipeline improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature for YouTube Wrapped! We love expanding the analytical metrics and dashboard capabilities.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: E.g., I'm always curious about my YouTube Shorts vs Long-form video split, but there's no chart for that...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: E.g., Add a new Databricks gold aggregation fact table for video duration categories and a dedicated card on the Next.js dashboard.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.

  - type: checkboxes
    id: willingness
    attributes:
      label: Willingness to Contribute
      options:
        - label: I am interested in contributing a pull request to implement this feature!
