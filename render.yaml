services:
  - type: web
    name: youtube-wrapped-api
    runtime: python
    region: singapore  # closest to India for low latency
    plan: free
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NEON_CONNECTION_STRING
        sync: false  # set this manually in dashboard, never commit it
      - key: PYTHON_VERSION
        value: "3.12"
      - key: CORS_ORIGINS
        sync: false  # set comma-separated origins, e.g. "https://youtube-wrapped-by-shaan.vercel.app"